<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dat Lich Kham Benh - HIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .booking-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
        }
        .slot-item {
            cursor: pointer;
            transition: all 0.3s;
        }
        .slot-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .slot-item.selected {
            border: 2px solid #667eea;
            background: #f0f4ff;
        }
        .result-card {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="booking-card">
                    <div class="card-header text-center">
                        <h2><i class="bi bi-hospital"></i> DAT LICH KHAM BENH</h2>
                        <p class="mb-0">He Thong Quan Ly Benh Vien</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="bookingForm">
                            <!-- Thong tin benh nhan -->
                            <h5 class="text-primary mb-3"><i class="bi bi-person-circle"></i> Thong Tin Benh Nhan</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Ho va Ten <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="fullName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">So Dien Thoai <span class="text-danger">*</span></label>
                                    <input type="tel" class="form-control" id="phone" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Ngay Sinh</label>
                                    <input type="date" class="form-control" id="dob">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Gioi Tinh</label>
                                    <select class="form-select" id="gender">
                                        <option value="">-- Chon --</option>
                                        <option value="1">Nam</option>
                                        <option value="2">Nu</option>
                                        <option value="3">Khac</option>
                                    </select>
                                </div>
                            </div>

                            <hr class="my-4">

                            <!-- Thong tin lich hen -->
                            <h5 class="text-primary mb-3"><i class="bi bi-calendar-check"></i> Thong Tin Lich Hen</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Khoa Kham <span class="text-danger">*</span></label>
                                    <select class="form-select" id="department" required>
                                        <option value="">-- Dang tai... --</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Bac Si <span class="text-danger">*</span></label>
                                    <select class="form-select" id="doctor" required>
                                        <option value="">-- Chon khoa truoc --</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ngay Kham <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="date" required>
                            </div>

                            <!-- Khung gio -->
                            <div class="mb-3">
                                <label class="form-label">Chon Khung Gio <span class="text-danger">*</span></label>
                                <div id="timeSlotsContainer" class="row g-2">
                                    <div class="col-12 text-center text-muted">
                                        <p>Vui long chon ngay kham de xem khung gio trong</p>
                                    </div>
                                </div>
                                <input type="hidden" id="timeSlotId" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ghi Chu</label>
                                <textarea class="form-control" id="note" rows="3"></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> DAT LICH NGAY
                                </button>
                            </div>
                        </form>

                        <!-- Result Card -->
                        <div class="result-card" id="resultCard">
                            <div class="alert alert-success">
                                <h4 class="alert-heading"><i class="bi bi-check-circle"></i> Dat Lich Thanh Cong!</h4>
                                <hr>
                                <p><strong>Ma Lich Hen:</strong> <span id="resultCode" class="text-primary"></span></p>
                                <p><strong>Ngay Kham:</strong> <span id="resultDate"></span></p>
                                <p class="mb-0"><small>Vui long giu ma nay de tra cuu lich hen</small></p>
                            </div>
                            <button class="btn btn-secondary" onclick="location.reload()">
                                <i class="bi bi-arrow-clockwise"></i> Dat Lich Moi
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:7239/api/AppointmentsApi';
        let selectedSlotId = null;

        // Load departments on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDepartments();
            
            // Set min date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').setAttribute('min', today);
            document.getElementById('date').value = today;
        });

        // Load departments
        async function loadDepartments() {
            try {
                const response = await fetch(`${API_BASE}/Departments`);
                const data = await response.json();
                
                const select = document.getElementById('department');
                select.innerHTML = '<option value="">-- Chon khoa --</option>';
                
                data.departments.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept.departmentId;
                    option.textContent = dept.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading departments:', error);
                alert('Loi tai danh sach khoa!');
            }
        }

        // Load doctors when department changes
        document.getElementById('department').addEventListener('change', async (e) => {
            const departmentId = e.target.value;
            const doctorSelect = document.getElementById('doctor');
            
            if (!departmentId) {
                doctorSelect.innerHTML = '<option value="">-- Chon khoa truoc --</option>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/Doctors?departmentId=${departmentId}`);
                const data = await response.json();
                
                doctorSelect.innerHTML = '<option value="">-- Chon bac si --</option>';
                
                data.doctors.forEach(doctor => {
                    const option = document.createElement('option');
                    option.value = doctor.staffId;
                    option.textContent = doctor.fullName;
                    doctorSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading doctors:', error);
                alert('Loi tai danh sach bac si!');
            }
        });

        // Load time slots when date changes
        document.getElementById('date').addEventListener('change', async (e) => {
            const date = e.target.value;
            if (!date) return;

            try {
                const response = await fetch(`${API_BASE}/AvailableSlots?date=${date}`);
                const data = await response.json();
                
                const container = document.getElementById('timeSlotsContainer');
                
                if (data.slots.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center text-danger"><p>Khong con khung gio trong trong ngay nay</p></div>';
                    return;
                }
                
                container.innerHTML = '';
                
                data.slots.forEach(slot => {
                    const col = document.createElement('div');
                    col.className = 'col-md-3 col-6';
                    col.innerHTML = `
                        <div class="card slot-item" onclick="selectSlot(${slot.timeSlotId}, this)">
                            <div class="card-body text-center p-2">
                                <div class="fw-bold">${slot.start} - ${slot.end}</div>
                                <small class="text-success">Con ${slot.available} cho</small>
                            </div>
                        </div>
                    `;
                    container.appendChild(col);
                });
            } catch (error) {
                console.error('Error loading slots:', error);
                alert('Loi tai khung gio!');
            }
        });

        // Select time slot
        function selectSlot(slotId, element) {
            // Remove previous selection
            document.querySelectorAll('.slot-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            // Add selection
            element.classList.add('selected');
            selectedSlotId = slotId;
            document.getElementById('timeSlotId').value = slotId;
        }

        // Submit form
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedSlotId) {
                alert('Vui long chon khung gio!');
                return;
            }

            const formData = {
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value || null,
                gender: parseInt(document.getElementById('gender').value) || null,
                departmentId: parseInt(document.getElementById('department').value),
                doctorId: parseInt(document.getElementById('doctor').value) || null,
                date: document.getElementById('date').value,
                timeSlotId: selectedSlotId,
                note: document.getElementById('note').value
            };

            try {
                const response = await fetch(`${API_BASE}/Book`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    // Show success
                    document.getElementById('resultCode').textContent = data.appointmentCode;
                    document.getElementById('resultDate').textContent = data.date;
                    document.getElementById('bookingForm').style.display = 'none';
                    document.getElementById('resultCard').style.display = 'block';
                } else {
                    alert(data.message || 'Loi dat lich!');
                }
            } catch (error) {
                console.error('Error booking:', error);
                alert('Loi ket noi server!');
            }
        });
    </script>
</body>
</html>
